name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Full history so a future `cs-coverage check` can reach the
          # pull request's merge base (see the deferred gate note below).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install CLI tools
        run: |
          for tool in mbake ty; do uv tool install ${tool}; done
          # Pin ruff to the same version as the dev dependency group in
          # pyproject.toml so the linter behaves identically across the uv tool,
          # the synced virtualenv, and developer PATH. Bump both sites together.
          uv tool install ruff==0.15.12
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Check spelling
        run: make spelling

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

      # NOTE: the shared generate-coverage action is not used here. Its
      # language auto-detection treats any repository-root Cargo.toml as
      # Rust (or "mixed" alongside pyproject.toml) with no override, and
      # lading commits a synthetic root Cargo.toml as a fixture for its
      # own workspace-release test scenarios (see
      # docs/repository-layout.md) — it references crates/ directories
      # that do not exist on disk. `cargo llvm-cov nextest --workspace`
      # therefore fails immediately in CI trying to resolve that
      # manifest. Coverage generation stays on the pre-existing bespoke
      # slipcover invocation until the shared action supports a
      # language override; the CodeScene wiring layers the shared
      # upload-codescene-coverage action on top of this coverage.xml
      # instead. Adds --xml: without it slipcover's --out target is a
      # plain-text report, not Cobertura XML, which went unnoticed
      # while the CodeScene upload step was guarded by an unset secret.
      - name: Run tests with coverage
        run: |
          uv pip install slipcover pytest-forked
          uv run python -m slipcover \
            --source=./lading \
            --omit="*/.venv/*" \
            --branch \
            --xml \
            --out coverage.xml \
            -m pytest --forked -v

      # Named coverage-report rather than "coverage" because the
      # upload-codescene-coverage action below unconditionally uploads
      # the same file as an artifact named "coverage"; sharing the name
      # makes the second upload fail with a 409 name conflict. Keeping
      # this standalone upload preserves the coverage artifact on runs
      # where the gate step is skipped (secret-less fork PRs, and
      # push-to-main where the gate is PR-only).
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # CodeScene accepts `cs-coverage upload` only for analysed branches
      # (main), so no upload happens on pull requests; coverage-main.yml
      # uploads on push to main instead. The changed-line gate below
      # reuses the bespoke coverage.xml generated above (see the note on
      # the "Run tests with coverage" step for why the shared
      # generate-coverage action cannot be used here).
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          path: coverage.xml
          mode: check
          project-url: https://api.codescene.io/v2/projects/72980
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
